<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Sales Entry</title>

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .product-row {
      background: #fff;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    .add-btn {
      background: #2196F3;
      color: white;
    }

    .submit-btn {
      background: #4CAF50;
      color: white;
    }
  </style>
</head>

<body>

<h2>Daily Sales Entry</h2>

<label>CSR NAME</label>
<input type="text" id="csrName" placeholder="Enter CSR Name">

<div id="products"></div>

<button class="add-btn" onclick="addProduct()">+ Add Product</button>
<button class="submit-btn" onclick="submitData()">Submit</button>

<script>
  function addProduct() {
    let container = document.getElementById("products");

    let div = document.createElement("div");
    div.className = "product-row";

    div.innerHTML = `
      <input placeholder="Product Code" class="code">
      <input placeholder="Product Value" type="number" class="productValue">
      <input placeholder="AMC Value" type="number" class="amcValue">
      <select class="plan">
        <option value="">Select AMC Plan</option>
        <option>Platinum 1 Year</option>
        <option>Platinum 2 Year</option>
        <option>Gold 1 Year</option>
        <option>Gold 4 Year</option>
      </select>
    `;

    container.appendChild(div);
  }

  function submitData() {
    let csr = document.getElementById("csrName").value.trim();
    let rows = document.querySelectorAll(".product-row");

    let products = [];

    rows.forEach(row => {
      let code = row.querySelector(".code").value.trim();
      let productValue = row.querySelector(".productValue").value.trim();
      let amcValue = row.querySelector(".amcValue").value.trim();
      let plan = row.querySelector(".plan").value;

      if (code && productValue && amcValue && plan) {
        products.push({code, productValue, amcValue, plan});
      }
    });

    // ✅ Validation
    if (!csr) {
      alert("Please enter CSR Name");
      return;
    }

    if (products.length === 0) {
      alert("Please add at least one complete product");
      return;
    }

    let data = {
      csrName: csr,
      products: products
    };

    fetch("https://script.google.com/macros/s/AKfycbzFGWffjcsYRW1kcH__gAFX4gFJwIUrjbp8NYq51yhAC77P0glw8GxIDOKQGXQQ5qtYhg/exec", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    })
    .then(response => response.text())
    .then(result => {
      alert("Submitted successfully!");
      location.reload();
    })
    .catch(error => {
      console.error(error);
      alert("Error submitting data");
    });
  }

  // Add first row automatically
  addProduct();
</script>

</body>
</html>
